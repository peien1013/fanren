<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>常見問題｜凡人小幫手</title>
  <link href="https://cdn.jsdelivr.net/gh/justfont/open-huninn-font@2.0/web/jf-openhuninn-2.0.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@600&family=Ma+Shan+Zheng&family=Noto+Sans+TC:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root{ --title-font:"Noto Sans TC","Microsoft JhengHei",sans-serif; }
    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body{ margin:0; padding:0; width:100%; min-height:100%; }
    body{ font-family:"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;
      background:
        radial-gradient(circle at 10% 8%, #fff1cf 0, transparent 26%),
        radial-gradient(circle at 90% 12%, #ffe1ec 0, transparent 24%),
        radial-gradient(circle at 8% 92%, #e2f4ff 0, transparent 22%),
        linear-gradient(180deg,#fff8e7 0%,#fff0d8 100%);
      color:#4a2a12; min-height:100vh; padding:20px 16px 60px; overflow-x:hidden; position:relative; }
    body::before,body::after{ content:""; position:fixed; border-radius:50%; pointer-events:none; z-index:0; }
    body::before{ width:200px; height:200px; left:-60px; top:25%; background:radial-gradient(circle at 30% 30%, #fff, #ffd6e7 70%, transparent 75%); opacity:.45; animation:floaty 8s ease-in-out infinite; }
    body::after{ width:240px; height:240px; right:-70px; top:60%; background:radial-gradient(circle at 30% 30%, #fff, #cfeaff 70%, transparent 75%); opacity:.4; animation:floaty 10s ease-in-out infinite reverse; }
    @keyframes floaty{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-26px) } }

    .page{ width:100%; max-width:760px; margin:0 auto; position:relative; z-index:1; }
    .topbar{ display:flex; align-items:center; gap:10px; margin-bottom:16px; }
    .back-btn{ display:inline-flex; align-items:center; gap:6px; background:#fff; color:#a85b15; font-weight:900; text-decoration:none;
      padding:9px 16px; border-radius:999px; border:2px solid #f4b85a; box-shadow:0 4px 10px rgba(120,70,10,.12); font-size:15px; }
    .back-btn:active{ transform:scale(.96); }
    .header{ text-align:center; margin:6px 0 18px; }
    .title{ display:inline-block; font-family:var(--title-font); font-size:clamp(28px,6.4vw,46px); font-weight:900; letter-spacing:3px;
      color:#5a2a10; text-shadow:2px 2px 0 #fff, 4px 4px 0 #ffd88a; padding:8px 22px; background:rgba(255,255,255,.55); border:3px dashed #f4b85a; border-radius:28px; }
    .subtitle{ margin-top:12px; color:#8a4a18; font-weight:800; font-size:clamp(14px,2.6vw,17px); min-height:1.2em; }

    /* 醒目大搜尋欄 */
    .search-wrap{ position:relative; max-width:620px; margin:4px auto 22px; }
    .search-ic{ position:absolute; left:20px; top:50%; transform:translateY(-50%); font-size:24px; pointer-events:none; }
    .search-input{ width:100%; font-family:inherit; font-size:clamp(17px,3.2vw,21px); font-weight:800; color:#5a2a10;
      padding:17px 52px 17px 56px; border:4px solid #ffd07a; border-radius:999px; background:#fff;
      box-shadow:0 8px 22px rgba(120,70,10,.16); outline:none; }
    .search-input::placeholder{ color:#cda979; font-weight:700; }
    .search-input:focus{ border-color:#f4923c; box-shadow:0 10px 26px rgba(244,146,60,.28); }
    .search-clear{ position:absolute; right:16px; top:50%; transform:translateY(-50%); cursor:pointer; border:none;
      background:#f0e0c0; color:#8a5a18; width:32px; height:32px; border-radius:50%; font-weight:900; font-size:18px;
      display:none; align-items:center; justify-content:center; line-height:1; }
    .search-clear.show{ display:flex; }
    .search-head{ text-align:center; font-weight:900; color:#a85b15; font-size:15px; margin-bottom:12px; }

    .theme-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:14px; }
    @media (min-width:600px){ .theme-grid{ grid-template-columns:repeat(3,1fr); } }
    .theme-card{ position:relative; cursor:pointer; user-select:none; overflow:hidden;
      background:linear-gradient(155deg,var(--bg1,#fff5d8),var(--bg2,#ffd99a));
      border:4px dashed #fff; border-radius:26px; padding:18px 12px 14px;
      box-shadow:0 10px 22px rgba(80,45,10,.14), inset 0 0 0 3px rgba(255,255,255,.4);
      display:flex; flex-direction:column; align-items:center; gap:8px; min-height:158px;
      transition:transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s ease; }
    .theme-card::before{ content:""; position:absolute; inset:0; pointer-events:none; background:
        radial-gradient(circle at 12% 14%, rgba(255,255,255,.6) 0 5px, transparent 6px),
        radial-gradient(circle at 88% 18%, rgba(255,255,255,.5) 0 4px, transparent 5px),
        radial-gradient(circle at 82% 90%, rgba(255,255,255,.45) 0 4px, transparent 5px); }
    .theme-card:hover{ transform:translateY(-8px) scale(1.03); box-shadow:0 18px 32px rgba(80,45,10,.2), 0 0 0 6px rgba(255,255,255,.5); }
    .theme-card:active{ transform:translateY(-2px) scale(.99); }
    .t-emoji{ position:relative; z-index:1; font-size:clamp(36px,7.6vw,46px); line-height:1; filter:drop-shadow(0 4px 6px rgba(0,0,0,.18)); }
    .t-name{ position:relative; z-index:1; flex:1; display:flex; align-items:center; justify-content:center; text-align:center; font-weight:900;
      font-size:clamp(18px,3.8vw,23px); line-height:1.28; color:var(--text,#c64500); text-shadow:1px 1px 0 rgba(255,255,255,.85); padding:6px 2px; }
    .t-count{ position:relative; z-index:1; font-size:12px; font-weight:800; color:var(--text,#c64500); opacity:.82; }
    .t-label{ position:relative; z-index:1; width:100%; text-align:center; color:#fff; font-weight:900; font-size:14px; letter-spacing:1px;
      padding:8px 6px; border-radius:999px; background:linear-gradient(135deg,var(--lab1,#ff8a2c),var(--lab2,#e65a00));
      box-shadow:inset 0 -2px 0 rgba(0,0,0,.08), 0 3px 6px rgba(0,0,0,.1); text-shadow:0 1px 2px rgba(0,0,0,.2); }

    .theme-back{ display:flex; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
    .theme-back-btn{ cursor:pointer; font-family:inherit; font-weight:900; background:#fff; color:#a85b15; border:2px solid #f4b85a; padding:9px 16px; border-radius:999px; font-size:15px; }
    .theme-back-btn:active{ transform:scale(.96); }
    .theme-title{ font-weight:900; font-size:clamp(18px,3.6vw,23px); color:#6b3a12; }

    .faq-list{ display:flex; flex-direction:column; gap:14px; }
    .faq-item{ background:linear-gradient(180deg,#fffef8,#fff5e0); border:3px solid #ffe0a8; border-radius:22px; box-shadow:0 6px 16px rgba(120,70,10,.1); overflow:hidden; }
    .q-tagrow{ padding:11px 16px 0; }
    .q-tag{ display:inline-block; color:#fff; font-weight:900; font-size:12px; padding:3px 12px; border-radius:999px; background:linear-gradient(135deg,var(--lab1,#ff8a2c),var(--lab2,#e65a00)); }
    .faq-q{ display:flex; align-items:center; gap:10px; padding:16px 18px; cursor:pointer; user-select:none; font-size:clamp(16px,3vw,20px); font-weight:900; color:#6b3a12; }
    .faq-q .qmark{ flex:0 0 auto; width:30px; height:30px; border-radius:50%; background:linear-gradient(135deg,var(--lab1,#ff8a2c),var(--lab2,#e65a00)); color:#fff; display:flex; align-items:center; justify-content:center; font-size:17px; }
    .faq-q .qtext{ flex:1; line-height:1.4; }
    .faq-q .arrow{ flex:0 0 auto; transition:transform .25s ease; color:#c64500; font-size:18px; }
    .faq-item.open .arrow{ transform:rotate(180deg); }
    .faq-a{ max-height:0; overflow:hidden; transition:max-height .3s ease, padding .3s ease; padding:0 18px; color:#5a3a1c; font-size:clamp(14px,2.6vw,17px); line-height:1.7; font-weight:600; white-space:pre-wrap; }
    .faq-item.open .faq-a{ max-height:1200px; padding:0 18px 18px; }
    .empty{ text-align:center; background:rgba(255,255,255,.9); border-radius:20px; padding:30px 18px; font-weight:900; color:#8a4a18; }
    .qa-loading{ text-align:center; background:rgba(255,255,255,.92); border-radius:26px; padding:34px 20px;
      font-family:var(--title-font); font-size:clamp(20px,4.6vw,28px); font-weight:900; color:#8a4a18; box-shadow:0 8px 22px rgba(120,70,10,.14); letter-spacing:2px; }
    .qa-loading .ch{ display:inline-block; animation:loadWave 1.2s ease-in-out infinite; animation-delay:calc(var(--i,0)*.07s); }
    @keyframes loadWave{ 0%,60%,100%{ transform:translateY(0) scale(1); opacity:.5; } 30%{ transform:translateY(-12px) scale(1.14); opacity:1; color:#d7691b; text-shadow:0 4px 8px rgba(215,105,27,.3); } }
    .cta{ margin-top:26px; text-align:center; }
    .cta-btn{ display:inline-block; text-decoration:none; font-weight:900; color:#fff; background:linear-gradient(135deg,#ff5e95,#d62b6d); padding:14px 26px; border-radius:999px; font-size:clamp(16px,3vw,19px); box-shadow:0 8px 18px rgba(120,70,10,.22); border:3px solid #fff; }
    .cta-btn:active{ transform:scale(.97); }
    .cta-note{ margin-top:10px; color:#8a4a18; font-weight:700; font-size:13px; }
    @media (prefers-reduced-motion:reduce){ *{ animation:none !important; transition-duration:.1s !important; } }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar"><a class="back-btn" href="index.html">← 回首頁</a></div>
    <header class="header">
      <div class="title">常見問題</div>
      <div class="subtitle" id="subtitle">載入中…</div>
    </header>

    <div class="search-wrap">
      <span class="search-ic">🔍</span>
      <input id="search" class="search-input" type="search" placeholder="輸入關鍵字找問題…" autocomplete="off" enterkeyhint="search">
      <button id="searchClear" class="search-clear" aria-label="清除搜尋">×</button>
    </div>

    <div id="content"></div>
    <div class="cta">
      <a class="cta-btn" href="message.html">💬 我要留言詢問</a>
      <div class="cta-note">找不到答案？直接留言問我們</div>
    </div>
  </div>

  <script>
    var API = "https://script.google.com/macros/s/AKfycbxw6eyMB_wjWSiUnX4U-7hbDfYrANT_NqWpPuJAzn5D3OZT51PE37gfeQxQIueQPsRN/exec";
    var OTHER = "__other__";
    var FAQ = [], CATS = [], COLORS = {}, EMOJIS = {};

    var COLOR_STYLES = {
      green:{bg1:"#f3ffd2",bg2:"#d8f5a0",text:"#2c7d13",lab1:"#75c635",lab2:"#4ea21c"},
      orange:{bg1:"#fff5d8",bg2:"#ffd99a",text:"#c64500",lab1:"#ff8a2c",lab2:"#e65a00"},
      pink:{bg1:"#ffeaf2",bg2:"#ffc0d6",text:"#c12466",lab1:"#ff5e95",lab2:"#d62b6d"},
      blue:{bg1:"#e7f4ff",bg2:"#b4dafc",text:"#1559a3",lab1:"#4296e3",lab2:"#1e6cc4"},
      red:{bg1:"#fff0d8",bg2:"#ffc1aa",text:"#b22510",lab1:"#ec5238",lab2:"#c1311b"},
      purple:{bg1:"#f3e6ff",bg2:"#d8b8ff",text:"#671d9a",lab1:"#9b54da",lab2:"#7a32b7"},
      yellow:{bg1:"#fffadc",bg2:"#ffe88a",text:"#9a7012",lab1:"#ffce3d",lab2:"#e2a900"},
      mint:{bg1:"#dffaf0",bg2:"#a5e8d2",text:"#0f7a5a",lab1:"#3ac499",lab2:"#1e9b76"},
      sky:{bg1:"#dff3ff",bg2:"#9bd5f5",text:"#0a6595",lab1:"#3ab0e0",lab2:"#1c87bb"},
      coral:{bg1:"#ffe4dd",bg2:"#ffb19c",text:"#b8421a",lab1:"#ff6b4a",lab2:"#d8462a"},
      rose:{bg1:"#fde4ec",bg2:"#f8a8c2",text:"#a82656",lab1:"#e0497a",lab2:"#b22a5c"},
      brown:{bg1:"#f5e6d3",bg2:"#d4a878",text:"#5c3a1c",lab1:"#8a5a32",lab2:"#5c3a1c"},
      gray:{bg1:"#f5f1e8",bg2:"#e2ddce",text:"#6b5f4a",lab1:"#a89c84",lab2:"#7d7058"}
    };
    var FALLBACK = ["green","orange","pink","blue","purple","mint","coral","yellow"];

    function jsonp(params){
      return new Promise(function(resolve, reject){
        var cb = "cb_" + Date.now() + "_" + Math.floor(Math.random()*1e6);
        var s = document.createElement("script");
        var timer = setTimeout(function(){ cleanup(); reject(new Error("timeout")); }, 15000);
        function cleanup(){ clearTimeout(timer); try{ delete window[cb]; }catch(e){ window[cb]=undefined; } if(s.parentNode) s.parentNode.removeChild(s); }
        window[cb] = function(data){ cleanup(); resolve(data); };
        var qs = Object.keys(params).map(function(k){ return encodeURIComponent(k)+"="+encodeURIComponent(params[k]); }).join("&");
        s.onerror = function(){ cleanup(); reject(new Error("network")); };
        s.src = API + "?" + qs + "&callback=" + cb;
        document.head.appendChild(s);
      });
    }

    var searchEl, clearEl;
    document.addEventListener("DOMContentLoaded", function(){
      searchEl = document.getElementById("search");
      clearEl = document.getElementById("searchClear");
      searchEl.addEventListener("input", onSearchInput);
      clearEl.addEventListener("click", function(){ searchEl.value=""; onSearchInput(); searchEl.focus(); });

      showLoading();
      jsonp({ action:"getFaq" }).then(function(res){
        FAQ = (res && Array.isArray(res.faq)) ? res.faq : [];
        CATS = (res && Array.isArray(res.categories)) ? res.categories : [];
        COLORS = (res && res.colors) ? res.colors : {};
        EMOJIS = (res && res.emojis) ? res.emojis : {};
        start();
      }).catch(function(){ setSub(""); renderEmpty("連線失敗，請重新整理頁面。"); });
    });

    function onSearchInput(){
      var q = searchEl.value.trim();
      clearEl.classList.toggle("show", !!q);
      if(!q){ start(); } else { showSearch(q); }
    }

    function catOf(it){ return String(it.category || "").trim(); }
    function setSub(t){ document.getElementById("subtitle").textContent = t; }
    function baseColor(name){ return String(name||"").toLowerCase().replace(/-(soft|vivid)$/,""); }

    function orderedCategories(){
      var distinct = [];
      FAQ.forEach(function(it){ var c=catOf(it); if(c && distinct.indexOf(c)<0) distinct.push(c); });
      var ordered = [];
      CATS.forEach(function(c){ if(distinct.indexOf(c)>=0) ordered.push(c); });
      distinct.forEach(function(c){ if(ordered.indexOf(c)<0) ordered.push(c); });
      return ordered;
    }
    function hasOther(){ return FAQ.some(function(it){ return !catOf(it); }); }
    function matches(it, cat){ if(cat===OTHER){ return !catOf(it); } return catOf(it)===cat; }
    function styleForCat(cat, idx){
      if(cat === OTHER) return COLOR_STYLES.gray;
      var st = COLOR_STYLES[baseColor(COLORS[cat])];
      return st || (idx!=null ? COLOR_STYLES[FALLBACK[idx % FALLBACK.length]] : null);
    }

    function start(){
      if(!FAQ.length){ setSub(""); renderEmpty("目前還沒有常見問題，您可以直接留言詢問我們。"); return; }
      var pres = orderedCategories();
      if(pres.length === 0){ showFlat(); return; }
      showThemes(pres, hasOther());
    }

    function showThemes(pres, other){
      setSub("選一個主題，或用上面搜尋");
      var content = document.getElementById("content"); content.innerHTML = "";
      var grid = document.createElement("div"); grid.className = "theme-grid";
      var themes = pres.slice();
      if(other) themes.push(OTHER);
      themes.forEach(function(cat, i){
        var count = FAQ.filter(function(it){ return matches(it, cat); }).length;
        var name = (cat === OTHER) ? "其他" : cat;
        var st = styleForCat(cat, i);
        var card = document.createElement("div"); card.className = "theme-card";
        card.style.setProperty("--bg1", st.bg1); card.style.setProperty("--bg2", st.bg2);
        card.style.setProperty("--text", st.text); card.style.setProperty("--lab1", st.lab1); card.style.setProperty("--lab2", st.lab2);
        var emo = (cat === OTHER) ? "💬" : (String(EMOJIS[cat] || "").trim() || "💬");
        var em = document.createElement("div"); em.className = "t-emoji"; em.textContent = emo; card.appendChild(em);
        var nm = document.createElement("div"); nm.className = "t-name"; nm.textContent = name; card.appendChild(nm);
        var ct = document.createElement("div"); ct.className = "t-count"; ct.textContent = count + " 個常見問題"; card.appendChild(ct);
        var lb = document.createElement("div"); lb.className = "t-label"; lb.textContent = "看問題 →"; card.appendChild(lb);
        card.addEventListener("click", function(){ showQuestions(cat, name); });
        grid.appendChild(card);
      });
      content.appendChild(grid);
      window.scrollTo(0, 0);
    }

    function showQuestions(cat, name){
      setSub("");
      var content = document.getElementById("content"); content.innerHTML = "";
      var back = document.createElement("div"); back.className = "theme-back";
      var btn = document.createElement("button"); btn.className = "theme-back-btn"; btn.textContent = "← 所有主題";
      btn.addEventListener("click", function(){ start(); });
      back.appendChild(btn);
      var st = styleForCat(cat);
      var h = document.createElement("div"); h.className = "theme-title"; h.textContent = name; if(st) h.style.color = st.text;
      back.appendChild(h);
      content.appendChild(back);

      var list = document.createElement("div"); list.className = "faq-list";
      var shown = FAQ.filter(function(it){ return matches(it, cat); });
      if(!shown.length){ var e=document.createElement("div"); e.className="empty"; e.textContent="這個主題目前沒有問題。"; list.appendChild(e); }
      else shown.forEach(function(it){ list.appendChild(buildItem(it, false)); });
      content.appendChild(list);
      window.scrollTo(0, 0);
    }

    function showFlat(){
      setSub("用上面搜尋，或往下看問題");
      var content = document.getElementById("content"); content.innerHTML = "";
      var list = document.createElement("div"); list.className = "faq-list";
      FAQ.forEach(function(it){ list.appendChild(buildItem(it, false)); });
      content.appendChild(list);
    }

    function showSearch(q){
      setSub("");
      var ql = q.toLowerCase();
      var results = FAQ.filter(function(it){
        return (String(it.q||"") + " " + String(it.a||"")).toLowerCase().indexOf(ql) >= 0;
      });
      var content = document.getElementById("content"); content.innerHTML = "";
      var head = document.createElement("div"); head.className = "search-head";
      head.textContent = results.length ? ("找到 " + results.length + " 個相關問題") : "找不到相關問題";
      content.appendChild(head);
      if(!results.length){
        var e=document.createElement("div"); e.className="empty"; e.textContent="換個關鍵字試試，或直接留言詢問我們。"; content.appendChild(e); return;
      }
      var list = document.createElement("div"); list.className = "faq-list";
      results.forEach(function(it){ list.appendChild(buildItem(it, true)); });
      content.appendChild(list);
    }

    function buildItem(item, showTag){
      var cat = catOf(item);
      var st = cat ? styleForCat(cat) : null;
      var wrap = document.createElement("div"); wrap.className="faq-item";
      if(st){ wrap.style.setProperty("--lab1", st.lab1); wrap.style.setProperty("--lab2", st.lab2); }

      if(showTag && cat){
        var row = document.createElement("div"); row.className="q-tagrow";
        var tag = document.createElement("span"); tag.className="q-tag"; tag.textContent = cat;
        row.appendChild(tag); wrap.appendChild(row);
      }

      var q = document.createElement("div"); q.className="faq-q";
      var mark = document.createElement("span"); mark.className="qmark"; mark.textContent="Q"; q.appendChild(mark);
      var qt = document.createElement("span"); qt.className="qtext"; qt.textContent=String(item.q||""); q.appendChild(qt);
      var arrow = document.createElement("span"); arrow.className="arrow"; arrow.textContent="▼"; q.appendChild(arrow);
      var a = document.createElement("div"); a.className="faq-a"; a.textContent=String(item.a||"");
      q.addEventListener("click", function(){ wrap.classList.toggle("open"); });
      wrap.appendChild(q); wrap.appendChild(a);
      return wrap;
    }

    function showLoading(){
      setSub("");
      var content = document.getElementById("content"); content.innerHTML = "";
      var box = document.createElement("div"); box.className = "qa-loading";
      "正在翻找問題中...".split("").forEach(function(c, i){
        var sp = document.createElement("span"); sp.className = "ch"; sp.style.setProperty("--i", i); sp.textContent = c; box.appendChild(sp);
      });
      content.appendChild(box);
    }

    function renderEmpty(text){
      var content = document.getElementById("content"); content.innerHTML = "";
      var e=document.createElement("div"); e.className="empty"; e.textContent=text; content.appendChild(e);
    }
  </script>
</body>
</html>
